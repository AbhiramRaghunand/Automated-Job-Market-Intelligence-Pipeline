# .github/workflows/daily_pull.yml
name: Daily Job Ingestion

on:
  schedule:
    - cron: '30 3 * * *'   # runs at 3:30 AM UTC = 9:00 AM IST daily
  workflow_dispatch:        # lets you trigger it manually from the Actions tab too

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion script
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python ingest.py

      - name: Commit and push new data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/raw/*.json logs/*.log
          git diff --staged --quiet || git commit -m "Daily data pull: $(date -u +'%Y-%m-%d')"
          git push
      
      - name: Email me on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "Daily Job Ingestion Failed"
          to: abhiram261104@gmail.com
          from: Job Market Pipeline
          body: |
            The daily ingestion run failed on ${{ github.repository }}.
            Check the logs here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}